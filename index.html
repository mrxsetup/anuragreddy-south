<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANURAG REDDY SOUTH VIP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
}

/* SMALLER iPhone Frame */
.phone-frame{
  width:340px;
  height:680px;
  background:#000;
  border-radius:45px;
  padding:14px;
  box-shadow:0 0 35px rgba(0,0,0,0.9);
  position:relative;
}

/* Notch */
.phone-frame::before{
  content:'';
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  height:28px;
  background:#000;
  border-radius:20px;
  z-index:20;
}

/* Screen Background */
.screen{
  width:100%;
  height:100%;
  border-radius:30px;
  overflow:hidden;
  background:url('https://github.com/mrxsetup/anuragreddy-south/blob/main/anuragreddy.jpg?raw=true') no-repeat center center;
  background-size:cover;
  position:relative;
  color:#fff;
}

/* Dark Overlay */
.screen::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  top:0;
  left:0;
  z-index:1;
}

/* STATUS BAR */
.status-bar{
  position:absolute;
  top:6px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 18px;
  font-size:13px;
  font-weight:600;
  z-index:30;
}

.status-icons{
  display:flex;
  align-items:center;
  gap:5px;
}

.battery{
  width:22px;
  height:10px;
  border:2px solid #fff;
  border-radius:3px;
  position:relative;
}

.battery::after{
  content:"";
  position:absolute;
  right:-4px;
  top:2px;
  width:3px;
  height:6px;
  background:#fff;
}

.battery-level{
  height:100%;
  background:#00ff00;
  width:80%;
}

/* CONTENT */
.card{
  position:relative;
  z-index:2;
  width:90%;
  text-align:center;
  margin:90px auto 0 auto;
}

.avatar{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid gold;
  object-fit:cover;
  box-shadow:0 0 15px gold;
}

.name{
  margin:15px 0;
  font-size:20px;
  font-weight:800;
  color:gold;
}

/* ROTATING BOX */
.league-box{
  position:relative;
  width:90px;
  height:90px;
  margin:18px auto;
  border-radius:20px;
  background:linear-gradient(135deg,#00eaff,#ffd700,#ff3cac);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  box-shadow:0 0 15px #00eaff,0 0 25px #ffd700;
}

.league-box img{
  position:absolute;
  max-width:75%;
  max-height:75%;
}

/* TIMER */
.timer{
  font-size:24px;
  font-weight:700;
  color:#00eaff;
  margin:10px 0;
}

.timer.alert{
  color:red;
  animation:shake .4s infinite;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-3px)}
  50%{transform:translateX(3px)}
  75%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}

.cta{
  display:inline-block;
  padding:10px 25px;
  border-radius:30px;
  background:#0b66ff;
  color:gold;
  font-weight:800;
  text-decoration:none;
  margin-top:12px;
  box-shadow:0 0 15px #ffd700;
}
</style>
</head>

<body>

<div class="phone-frame">
  <div class="screen">

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div id="time">12:00</div>
      <div class="status-icons">
        📶 📡
        <div class="battery">
          <div id="batteryLevel" class="battery-level"></div>
        </div>
        <span id="batteryText">80%</span>
      </div>
    </div>

    <div class="card">

      <img class="avatar" src="https://github.com/mrxsetup/anuragreddy-south/blob/main/anuragreddy.jpg?raw=true">
      <div class="name">ANURAG REDDY SOUTH</div>

      <!-- ROTATING BOX -->
      <div class="league-box">
        <img id="logo" src="https://github.com/mrxsetup/anuragreddy-south/blob/main/anuragreddy.jpg?raw=true">
      </div>

      <div id="timer" class="timer">1:00</div>

      <p><b>🏆 IPL 2025 – 74/77 PASSED</b><br>
      <b>🏆 BBL 2026 – 64/67 PASSED</b></p>

      <a class="cta"
      href="https://t.me/+478AfJUJOS8zYmI1">
      JOIN TELEGRAM
      </a>

    </div>

  </div>
</div>

<script>
/* REAL TIME CLOCK */
function updateTime(){
  const now = new Date();
  let hours = now.getHours();
  let minutes = now.getMinutes();
  minutes = minutes < 10 ? "0" + minutes : minutes;
  document.getElementById("time").innerText = hours + ":" + minutes;
}
setInterval(updateTime,1000);
updateTime();

/* BATTERY ANIMATION */
let battery = 80;
setInterval(()=>{
  battery = battery > 20 ? battery-1 : 80;
  document.getElementById("batteryLevel").style.width = battery + "%";
  document.getElementById("batteryText").innerText = battery + "%";
},5000);

/* TIMER */
let totalSeconds = 60;
const timerElement = document.getElementById("timer");

const countdown = setInterval(() => {
  let minutes = Math.floor(totalSeconds / 60);
  let seconds = totalSeconds % 60;

  timerElement.innerText =
    minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

  if (totalSeconds <= 10) {
    timerElement.classList.add("alert");
  }

  if (totalSeconds <= 0) {
    clearInterval(countdown);
  }

  totalSeconds--;
}, 1000);

/* ROTATING IMAGE */
const imgs=[
 "https://github.com/mrxsetup/anuragreddy-south/blob/main/anuragreddy.jpg?raw=true",
 "https://github.com/mrxsetup/lucknowfixer/blob/main/assets/logo16.png?raw=true",
 "https://github.com/mrxsetup/lucknowfixer/blob/main/assets/logo15.png?raw=true"
];

let i=0;
const logo=document.getElementById("logo");

setInterval(()=>{
  i=(i+1)%imgs.length;
  logo.src=imgs[i];
},2000);
</script>

</body>
</html>
